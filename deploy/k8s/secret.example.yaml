# TEMPLATE — do NOT commit real secrets.
# In production, populate this Secret from an external store:
#   - AWS Secrets Manager via the Secrets Store CSI Driver
#   - HashiCorp Vault via vault-k8s injector
#   - Sealed Secrets / External Secrets Operator
#
# Apply with: kubectl apply -f secret.example.yaml (only after replacing values).
apiVersion: v1
kind: Secret
metadata:
  name: stem-agent-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/stem_agent"
  REDIS_URL: "redis://HOST:6379"

  # Set one of these depending on LLM_PROVIDER.
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # Optional — used by EMBEDDING_PROVIDER=openai.
  EMBEDDING_API_KEY: ""
